        // Function to stop video in a specific modal
        function stopVideo(modalToggle) {
            const videoItem = modalToggle.closest('.video-item');
            if (videoItem) {
                const iframe = videoItem.querySelector('.modal iframe');
                if (iframe) {
                    // Resetting src stops the video and unloads it to save memory
                    iframe.src = '';
                }
            }
        }

        // Listen for all modal toggle changes
        document.querySelectorAll('.modal-toggle').forEach(toggle => {
            toggle.addEventListener('change', function() {
                if (this.checked) {
                    // Lazy load iframe src to save page load time
                    const videoItem = this.closest('.video-item');
                    if (videoItem) {
                        const iframe = videoItem.querySelector('.modal iframe');
                        if (iframe && iframe.dataset.src) {
                            iframe.src = iframe.dataset.src;
                        }
                    }

                    // When opening one video, stop all others just in case
                    document.querySelectorAll('.modal-toggle').forEach(other => {
                        if (other !== this && other.checked) {
                            other.checked = false;
                            stopVideo(other);
                        }
                    });
                } else {
                    // When closing this video, stop it
                    stopVideo(this);
            
                }
            });
        });

        // Also stop videos when clicking sidebar navigation links
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', () => {
                document.querySelectorAll('.modal-toggle').forEach(toggle => {
                    if (toggle.checked) {
                        toggle.checked = false;
                        stopVideo(toggle);
                    }
                });
            });
        });
